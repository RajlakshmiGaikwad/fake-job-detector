<!DOCTYPE html>
<html>
<head>
  <title>Fake Job Detector</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<h2 class="text-center">🤖 AI Job Scam Detector</h2>
<p class="text-center text-muted">Powered by intelligent pattern analysis</p>

<textarea id="jobText" class="form-control mt-3" placeholder="Paste job description"></textarea>

<button onclick="checkJob()" class="btn btn-primary mt-3 w-100">
  Analyze Job
</button>

<div id="result" class="mt-4"></div>
<button onclick="loadHistory()" class="btn btn-secondary mt-2">
  Show History
</button>

<div id="history" class="mt-3"></div>

<script>
async function checkJob() {
  let description = document.getElementById("jobText").value;

  let res = await fetch("http://localhost:3000/analyze-job", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ description })
  });

  let data = await res.json();

  let color =
    data.status === "Likely Fake" ? "bg-danger" :
    data.status === "Suspicious" ? "bg-warning" :
    "bg-success";

  document.getElementById("result").innerHTML = `
    <h4>AI Trust Score: ${data.score}%</h4>

    <div class="progress">
      <div class="progress-bar ${color}" style="width: ${data.score}%">
        ${data.score}%
      </div>
    </div>

    <h5 class="mt-3">Status: ${data.status}</h5>
    <p><b>Confidence:</b> ${data.confidence}</p>

    <h6>Reasons:</h6>
    <ul>
      ${data.reasons.map(r => `<li>${r}</li>`).join("")}
    </ul>

    <h6>Suggestions:</h6>
    <ul>
      ${data.suggestions.map(s => `<li>${s}</li>`).join("")}
    </ul>
  `;
}
async function loadHistory() {
  try {
    let res = await fetch("http://localhost:3000/history");
    let data = await res.json();

    let html = "<h4>Previous Checks</h4>";

    data.forEach(job => {
      html += `
        <div class="card p-2 mt-2">
          <p>${job.description}</p>
          <b>Score:</b> ${job.score} |
          <b>Status:</b> ${job.status}
        </div>
      `;
    });

    document.getElementById("history").innerHTML = html;

  } catch (error) {
    console.log(error);
    alert("Error loading history");
  }
}
</script>

</body>
</html>
